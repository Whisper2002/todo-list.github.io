<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f5ee">
    <title>Todo List</title>
    <link rel="icon" href="assets/focus-scene.png" type="image/png">
    <link rel="preload" as="image" href="assets/focus-scene.png">
    <link rel="stylesheet" href="styles.css?v=20260624-sync5">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Today</p>
            <h1 id="app-title">Todo List</h1>
          </div>
          <div class="stats" aria-label="任务统计">
            <span><strong id="remaining-count">0</strong> 待办</span>
            <span><strong id="done-count">0</strong> 完成</span>
            <button class="sync-toggle" id="sync-toggle" type="button" aria-expanded="false" aria-controls="sync-panel">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 0-15.5-6.2L3 8M3 3v5h5M3 12a9 9 0 0 0 15.5 6.2L21 16M16 16h5v5"/></svg>
              <span id="sync-badge">未同步</span>
            </button>
          </div>
        </header>

        <section class="sync-panel" id="sync-panel" hidden>
          <form class="sync-form" id="sync-form" autocomplete="off">
            <label for="sync-token">
              <span>Token</span>
              <input id="sync-token" type="password" placeholder="github_pat_..." autocomplete="off">
            </label>
            <label for="sync-gist">
              <span>Gist ID</span>
              <input id="sync-gist" type="text" placeholder="留空可新建">
            </label>
            <button class="primary-btn" id="sync-save" type="submit">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
              <span>保存</span>
            </button>
          </form>
          <div class="sync-actions">
            <button class="ghost-btn" id="sync-create" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              <span>新建 Gist</span>
            </button>
            <button class="ghost-btn" id="sync-now" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 0-15.5-6.2L3 8M3 3v5h5M3 12a9 9 0 0 0 15.5 6.2L21 16M16 16h5v5"/></svg>
              <span>同步</span>
            </button>
            <button class="ghost-btn" id="sync-pull" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
              <span>拉取</span>
            </button>
          </div>
          <p class="sync-status" id="sync-status" role="status">未配置 GitHub 同步</p>
        </section>

        <form class="task-form" id="task-form" autocomplete="off">
          <label class="task-input-wrap" for="task-title">
            <span class="sr-only">任务名称</span>
            <input id="task-title" name="title" type="text" placeholder="添加一个任务..." maxlength="120" required>
          </label>
          <label class="select-wrap" for="task-priority">
            <span class="sr-only">优先级</span>
            <select id="task-priority" name="priority" aria-label="优先级">
              <option value="normal">普通</option>
              <option value="high">重要</option>
              <option value="low">低优先</option>
            </select>
          </label>
          <label class="date-wrap" for="task-due">
            <span class="sr-only">日期</span>
            <input id="task-due" name="due" type="date" aria-label="日期">
          </label>
          <button class="primary-btn" type="submit">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            <span>添加</span>
          </button>
        </form>

        <nav class="controls" aria-label="任务视图">
          <div class="segmented" role="tablist" aria-label="筛选">
            <button class="segment is-active" type="button" data-filter="all" role="tab" aria-selected="true">全部</button>
            <button class="segment" type="button" data-filter="active" role="tab" aria-selected="false">待办</button>
            <button class="segment" type="button" data-filter="done" role="tab" aria-selected="false">完成</button>
          </div>
          <label class="search-wrap" for="search-input">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z"/></svg>
            <span class="sr-only">搜索任务</span>
            <input id="search-input" type="search" placeholder="搜索">
          </label>
        </nav>

        <section class="list-panel" aria-live="polite">
          <ul class="task-list" id="task-list"></ul>
          <div class="empty-state" id="empty-state" hidden>
            <img src="assets/focus-scene.png" alt="" width="720" height="360">
            <p id="empty-title">没有任务</p>
          </div>
        </section>

        <footer class="footer-actions">
          <button class="ghost-btn" id="clear-completed" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M9 11v6M15 11v6M6 6l1 14h10l1-14"/></svg>
            <span>清除完成</span>
          </button>
        </footer>
      </section>
    </main>

    <template id="task-template">
      <li class="task-item">
        <label class="check-wrap">
          <input class="task-check" type="checkbox">
          <span class="check-mark" aria-hidden="true"></span>
        </label>
        <div class="task-content">
          <input class="task-edit" type="text" maxlength="120">
          <div class="task-meta">
            <label class="task-field">
              <span class="sr-only">修改优先级</span>
              <select class="task-priority-edit" aria-label="修改优先级">
                <option value="normal">普通</option>
                <option value="high">重要</option>
                <option value="low">低优先</option>
              </select>
            </label>
            <label class="task-field">
              <span class="sr-only">修改日期</span>
              <input class="task-due-edit" type="date" aria-label="修改日期">
            </label>
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn edit-btn" type="button" aria-label="编辑任务" title="编辑任务">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
          <button class="icon-btn delete-btn" type="button" aria-label="删除任务" title="删除任务">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M9 11v6M15 11v6M6 6l1 14h10l1-14"/></svg>
          </button>
        </div>
      </li>
    </template>

    <script src="app.js?v=20260624-sync5"></script>
  </body>
</html>
